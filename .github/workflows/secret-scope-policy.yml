name: Secret Scope Policy

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'scripts/check-secret-scope.sh'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'scripts/check-secret-scope.sh'

permissions:
  contents: read

jobs:
  policy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Validate workflow secret scope
        run: bash scripts/check-secret-scope.sh .github/workflows
